steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/label-lens', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/label-lens']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'label-lens'
      - '--image=gcr.io/$PROJECT_ID/label-lens'
      - '--region=us-central1'
      - '--no-allow-unauthenticated'
      - '--port=8080'
